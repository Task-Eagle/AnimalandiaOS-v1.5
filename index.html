<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🦁🐆🍃AnimalandiaOS</title>

<style>
:root {
    --taskbar-height: 48px;
    --accent: #4da3ff;
    --glass: rgba(255,255,255,0.12);
    --dark: rgba(20,20,20,0.65);
    --text: white;
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    user-select: none;
    font-family: Segoe UI, sans-serif;
}

body {
    overflow: hidden;
    height: 100vh;
    background: linear-gradient(to bottom,#0a0a2e,#1a1a4e,#0d0d3a);
    color: white;
}

#boot-screen,
#login-screen {
    position: fixed;
    inset: 0;
    z-index: 9999999;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    background: black;
}

#boot-screen {
    animation: bootFade 1s forwards;
    animation-delay: 2.4s;
}

@keyframes bootFade {
    to {
        opacity: 0;
        visibility: hidden;
    }
}

.boot-loader {
    width: 240px;
    height: 6px;
    background: #222;
    border-radius: 999px;
    overflow: hidden;
    margin-top: 20px;
}

.boot-loader::after {
    content: '';
    display: block;
    width: 0;
    height: 100%;
    background: #4da3ff;
    animation: boot 2.2s linear forwards;
}

@keyframes boot {
    to { width: 100%; }
}

#login-screen {
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(20px);
}

.login-card {
    width: 340px;
    padding: 30px;
    border-radius: 22px;
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.15);
    display: flex;
    flex-direction: column;
    gap: 14px;
}

.login-card input,
.login-card button {
    padding: 12px;
    border-radius: 10px;
    border: none;
}

/* Control Center Animation */
#control-center {
    animation: slideIn .2s ease;
}

@keyframes slideIn {
    from {
        opacity: 0;
        transform: translateY(10px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

/* Clock styling */
#control-center-trigger {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
}

#clock-time {
    font-weight: 600;
}

#clock-date {
    color: rgba(255,255,255,0.7);
}

#desktop {
    width: 100%;
    height: calc(100vh - var(--taskbar-height));
    position: relative;
    padding: 20px;
    display: flex;
    flex-direction: column;
    flex-wrap: wrap;
    gap: 20px;
}

.desktop-icon {
    width: 90px;
    text-align: center;
    padding: 10px;
    border-radius: 10px;
    cursor: pointer;
}

.desktop-icon:hover,
.desktop-icon.selected {
    background: rgba(255,255,255,0.12);
}

.desktop-icon img {
    width: 48px;
    height: 48px;
}

.window {
    position: absolute;
    width: 700px;
    height: 450px;
    background: rgba(255,255,255,0.15);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 16px;
    overflow: hidden;
    backdrop-filter: blur(24px);
    box-shadow: 0 20px 50px rgba(0,0,0,0.4);
    animation: openAnim .18s ease;
    transition: all .18s ease;
}

@keyframes openAnim {
    from {
        transform: scale(.92);
        opacity: 0;
    }

    to {
        transform: scale(1);
        opacity: 1;
    }
}

.titlebar {
    height: 42px;
    background: rgba(255,255,255,0.08);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 16px;
}

.window-buttons {
    display: flex;
    gap: 8px;
}

.window-btn {
    width: 12px;
    height: 12px;
    border-radius: 50%;
    cursor: pointer;
}

.close { background: #ff5f56; }
.min { background: #ffbd2e; }
.max { background: #27c93f; }

.window-content {
    width: 100%;
    height: calc(100% - 42px);
}

.resize-handle {
    width: 18px;
    height: 18px;
    position: absolute;
    right: 0;
    bottom: 0;
    cursor: nwse-resize;
}

#taskbar {
    position: fixed;
    bottom: 0;
    width: 100%;
    height: var(--taskbar-height);
    background: rgba(255,255,255,0.12);
    backdrop-filter: blur(18px);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
}

.taskbar-icon {
    width: 40px;
    height: 40px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
}

.taskbar-icon:hover {
    background: rgba(255,255,255,0.12);
}

.taskbar-icon img {
    width: 24px;
}

#desktop-menu {
    position: fixed;
    width: 220px;
    background: rgba(20,20,20,0.95);
    border-radius: 12px;
    overflow: hidden;
    display: none;
    z-index: 999999;
}

#desktop-menu div {
    padding: 12px;
    cursor: pointer;
}

#desktop-menu div:hover {
    background: rgba(255,255,255,0.08);
}

#selection-box {
    position: fixed;
    border: 1px solid #4da3ff;
    background: rgba(77,163,255,0.2);
    display: none;
    pointer-events: none;
}

#notification-center {
    position: fixed;
    top: 20px;
    right: 20px;
    width: 300px;
    z-index: 999999;
}

.notification {
    background: rgba(20,20,20,0.9);
    border-radius: 12px;
    padding: 14px;
    margin-bottom: 10px;
}

#alt-tab {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%,-50%);
    background: rgba(20,20,20,0.95);
    padding: 20px;
    border-radius: 20px;
    display: none;
    z-index: 999999;
}

#desktop-switcher {
    position: fixed;
    top: 10px;
    right: 10px;
    display: flex;
    gap: 8px;
    z-index: 999999;
}

#desktop-switcher button {
    width: 32px;
    height: 32px;
    border: none;
    border-radius: 8px;
    background: rgba(255,255,255,0.12);
    color: white;
}

.app-btn,
.app-input {
    padding: 10px;
    border-radius: 10px;
    border: none;
}

.app-btn {
    background: #4da3ff;
    color: white;
}
</style>
</head>
<body>

<div id="boot-screen">
    <h1>🦁 AnimalandiaOS</h1>
    <div class="boot-loader"></div>
</div>

<div id="login-screen">
    <div class="login-card">
        <h2>Welcome</h2>
        <input id="login-name" placeholder="Username">
        <button onclick="loginOS()">Login</button>
    </div>
</div>

<div id="desktop-menu">
    <div onclick="cycleWallpaper()">Next Wallpaper</div>
    <div onclick="openWindow('Settings')">Settings</div>
    <div onclick="notify('Desktop refreshed')">Refresh</div>
</div>

<div id="selection-box"></div>
<div id="notification-center"></div>
<div id="alt-tab"></div>

<div id="desktop-switcher">
    <button onclick="switchDesktop(0)">1</button>
    <button onclick="switchDesktop(1)">2</button>
    <button onclick="switchDesktop(2)">3</button>
</div>

<div id="desktop">

<div class="desktop-icon" ondblclick="openWindow('Computer')">
    <img src="https://cdn-icons-png.flaticon.com/512/3524/3524659.png">
    <div>Computer</div>
</div>

<div class="desktop-icon" ondblclick="openWindow('Browser')">
    <img src="https://cdn-icons-png.flaticon.com/512/5968/5968604.png">
    <div>Browser</div>
</div>

<div class="desktop-icon" ondblclick="openWindow('Music')">
    <img src="https://cdn-icons-png.flaticon.com/512/727/727245.png">
    <div>Music</div>
</div>

<div class="desktop-icon" ondblclick="openWindow('Paint')">
    <img src="https://cdn-icons-png.flaticon.com/512/2970/2970785.png">
    <div>Paint</div>
</div>

</div>

<!-- NEW START MENU CONTAINER -->
<div id="start-menu" style="position:fixed; bottom:58px; left:10px; width:240px; background:rgba(20,20,20,0.95); border-radius:12px; padding:10px; display:none; z-index:999999; border:1px solid rgba(255,255,255,0.1);">
    <div style="padding:10px; font-weight:bold; color:#4da3ff; border-bottom:1px solid rgba(255,255,255,0.1); margin-bottom:10px;">
        🦁 AnimalandiaOS
    </div>
    <div onclick="openWindow('Tulo')" style="padding:10px; cursor:pointer; display:flex; align-items:center; gap:10px;">
        🐢 Tulo Writer
    </div>
    <div onclick="openWindow('Explorer')" style="padding:10px; cursor:pointer; display:flex; align-items:center; gap:10px;">
        📂 File Explorer
    </div>
    <div onclick="openWindow('Settings')" style="padding:10px; cursor:pointer; display:flex; align-items:center; gap:10px;">
        ⚙️ Settings
    </div>
    <div onclick="location.reload()" style="padding:10px; cursor:pointer; color:#ff5f56; margin-top:10px;">
        🛑 Shut Down
    </div>
</div>

<div id="taskbar">
    <!-- CENTERED START BUTTON -->
    <div class="taskbar-icon" id="start-btn" onclick="toggleStartMenu()" style="background:rgba(255,255,255,0.1);">
        <span style="font-size:20px;">🦁</span>
    </div>
    
    <!-- Dynamic Taskbar Items will be injected here by JS -->
    <div id="taskbar-apps" style="display:flex; gap:8px;"></div>

    <!-- Existing Static Icons (Optional, or move them to Start Menu) -->
    <div class="taskbar-icon" onclick="openWindow('Browser')">
        <img src="https://cdn-icons-png.flaticon.com/512/5968/5968604.png">
    </div>
    <div class="taskbar-icon" onclick="openWindow('Settings')">
        <img src="https://cdn-icons-png.flaticon.com/512/2040/2040509.png">
    </div>
    
    <!-- DATE/TIME & CONTROL CENTER TRIGGER -->
    <div id="control-center-trigger" onclick="toggleControlCenter()" style="margin-left:auto; padding:0 15px; cursor:pointer; font-size:13px;">
        <span id="clock-time">12:00</span>
        <span id="clock-date" style="font-size:11px; color:#aaa;">May 14</span>
    </div>
</div>

<!-- CONTROL CENTER PANEL (NEW) -->
<div id="control-center" style="position:fixed; bottom:58px; right:10px; width:320px; background:rgba(20,20,20,0.95); border-radius:12px; padding:15px; display:none; z-index:999999; border:1px solid rgba(255,255,255,0.1); backdrop-filter:blur(18px);">
    <div style="font-weight:bold; margin-bottom:15px; border-bottom:1px solid rgba(255,255,255,0.1); padding-bottom:10px;">
        🎛️ Control Center
    </div>
    
    <!-- Media Controls -->
    <div style="margin-bottom:15px;">
        <div style="font-size:12px; margin-bottom:8px;">🎵 Now Playing</div>
        <div style="display:flex; align-items:center; gap:10px;">
            <button id="media-play-btn" class="app-btn" onclick="toggleMediaPlay()" style="width:40px; height:40px; border-radius:50%; padding:0;">▶️</button>
            <div style="flex:1; height:4px; background:rgba(255,255,255,0.2); border-radius:2px;">
                <div id="media-progress" style="width:30%; height:100%; background:#4da3ff; border-radius:2px;"></div>
            </div>
        </div>
    </div>
    
    <!-- Volume Control -->
    <div style="margin-bottom:15px;">
        <div style="font-size:12px; margin-bottom:8px;">🔊 Volume</div>
        <input type="range" id="volume-slider" min="0" max="100" value="70" onchange="updateVolume(this.value)" style="width:100%;">
    </div>
    
    <!-- Calendar Mini View -->
    <div>
        <div style="font-size:12px; margin-bottom:8px;">📅 Calendar</div>
        <div id="mini-calendar" style="background:rgba(255,255,255,0.05); padding:10px; border-radius:8px; font-size:11px; text-align:center;">
            <!-- Calendar will be populated by JS -->
        </div>
    </div>
</div>

<script>
const OS = {
    theme: localStorage.getItem('animal-theme') || 'dark',
    wallpaper: localStorage.getItem('animal-wallpaper') || 'space',
    currentDesktop: 0,
    sounds: true
};

let z = 10;
let altIndex = 0;

const openWindowsRegistry = {};

const wallpapers = {
    space: 'linear-gradient(to bottom,#0a0a2e,#1a1a4e,#0d0d3a)',
    sunset: 'linear-gradient(135deg,#ff7e5f,#feb47b)',
    forest: 'linear-gradient(135deg,#0f2027,#203a43,#2c5364)',
    neon: 'linear-gradient(135deg,#0f0c29,#302b63,#24243e)'
};

let virtualFileSystem = JSON.parse(localStorage.getItem('animal-files') || '[]');

function loginOS() {
    document.getElementById('login-screen').style.display = 'none';
}

function toggleStartMenu() {
    const menu = document.getElementById('start-menu');
    menu.style.display = menu.style.display === 'block' ? 'none' : 'block';
}

// Close start menu if clicking elsewhere
window.addEventListener('click', (e) => {
    const menu = document.getElementById('start-menu');
    const btn = document.getElementById('start-btn');
    if (!menu.contains(e.target) && !btn.contains(e.target)) {
        menu.style.display = 'none';
    }
});

function updateClock() {
    const now = new Date();
    const hours = String(now.getHours()).padStart(2, '0');
    const minutes = String(now.getMinutes()).padStart(2, '0');
    const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    
    document.getElementById('clock-time').innerText = `${hours}:${minutes}`;
    document.getElementById('clock-date').innerText = `${months[now.getMonth()]} ${now.getDate()}`;
}

// Update clock every second
setInterval(updateClock, 1000);
updateClock(); // Initial call

function toggleControlCenter() {
    const cc = document.getElementById('control-center');
    cc.style.display = cc.style.display === 'block' ? 'none' : 'block';
    
    // Close if clicking elsewhere
    if (cc.style.display === 'block') {
        setTimeout(() => {
            document.addEventListener('click', closeControlCenterOutside);
        }, 100);
    }
}

function closeControlCenterOutside(e) {
    const cc = document.getElementById('control-center');
    const trigger = document.getElementById('control-center-trigger');
    if (!cc.contains(e.target) && !trigger.contains(e.target)) {
        cc.style.display = 'none';
        document.removeEventListener('click', closeControlCenterOutside);
    }
}

let isPlaying = false;
let mediaProgress = 30;

function toggleMediaPlay() {
    isPlaying = !isPlaying;
    const btn = document.getElementById('media-play-btn');
    btn.innerText = isPlaying ? '⏸️' : '▶️';
    
    if (isPlaying) {
        // Simulate progress (in real app, connect to actual audio)
        simulateMediaProgress();
    }
}

function simulateMediaProgress() {
    if (!isPlaying) return;
    mediaProgress += 1;
    if (mediaProgress > 100) mediaProgress = 0;
    document.getElementById('media-progress').style.width = mediaProgress + '%';
    setTimeout(simulateMediaProgress, 2000);
}

function updateVolume(value) {
    // In a real app, this would adjust audio context volume
    notify(`Volume set to ${value}%`);
    // You could also store this in OS object: OS.volume = value;
}

function renderMiniCalendar() {
    const now = new Date();
    const year = now.getFullYear();
    const month = now.getMonth();
    const daysInMonth = new Date(year, month + 1, 0).getDate();
    const firstDay = new Date(year, month, 1).getDay();
    const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
    
    let html = `<strong>${months[month]} ${year}</strong><br><br>`;
    html += '<div style="display:grid; grid-template-columns:repeat(7,1fr); gap:2px; font-size:10px;">';
    
    // Day headers
    const dayNames = ['Su','Mo','Tu','We','Th','Fr','Sa'];
    dayNames.forEach(d => html += `<div>${d}</div>`);
    
    // Empty cells for days before month starts
    for (let i = 0; i < firstDay; i++) {
        html += '<div></div>';
    }
    
    // Days of month
    for (let d = 1; d <= daysInMonth; d++) {
        const isToday = d === now.getDate();
        html += `<div style="${isToday ? 'background:#4da3ff; color:white; border-radius:4px;' : ''}">${d}</div>`;
    }
    
    html += '</div>';
    document.getElementById('mini-calendar').innerHTML = html;
}

// Render calendar when control center opens
const originalToggleControlCenter = toggleControlCenter;
toggleControlCenter = function() {
    renderMiniCalendar();
    originalToggleControlCenter();
};

function applyWallpaper(name) {
    document.body.style.background = wallpapers[name];
    OS.wallpaper = name;
    localStorage.setItem('animal-wallpaper', name);
}

function cycleWallpaper() {
    const keys = Object.keys(wallpapers);
    const current = keys.indexOf(OS.wallpaper);
    const next = keys[(current + 1) % keys.length];
    applyWallpaper(next);
}

function notify(text) {
    const center = document.getElementById('notification-center');

    const note = document.createElement('div');
    note.className = 'notification';
    note.innerText = text;

    center.appendChild(note);

    setTimeout(() => note.remove(), 4000);
}

function createTaskbarItem(id, title) {
    const container = document.getElementById('taskbar-apps');
    const item = document.createElement('div');
    item.className = 'taskbar-icon';
    item.id = 'tb-' + id;
    item.onclick = () => {
        const win = openWindowsRegistry[id];
        if (win.style.display === 'none') {
            win.style.display = 'block';
            win.style.zIndex = ++z;
        } else {
            // If already visible and focused, minimize it
            if (win.style.zIndex == z) {
                win.style.display = 'none';
            } else {
                win.style.zIndex = ++z;
            }
        }
    };
    
    // Simple icon logic based on ID
    let iconEmoji = '📄';
    if(id === 'browser') iconEmoji = '🌐';
    if(id === 'tulo') iconEmoji = '🐢';
    if(id === 'explorer') iconEmoji = '📂';
    if(id === 'settings') iconEmoji = '⚙️';
    
    item.innerHTML = `<span style="font-size:18px;">${iconEmoji}</span>`;
    container.appendChild(item);
}

function removeTaskbarItem(id) {
    const item = document.getElementById('tb-' + id);
    if (item) item.remove();
}

function highlightTaskbar(id) {
    // Optional: Add a visual indicator (like a border) to the active taskbar item
    document.querySelectorAll('.taskbar-icon').forEach(el => el.style.borderBottom = 'none');
    const item = document.getElementById('tb-' + id);
    if(item) item.style.borderBottom = '2px solid #4da3ff';
}
    
function openWindow(title) {
    const id = title.toLowerCase();

    // If already open, bring to front
    if (openWindowsRegistry[id]) {
        openWindowsRegistry[id].style.display = 'block';
        openWindowsRegistry[id].style.zIndex = ++z;
        // Highlight taskbar item
        highlightTaskbar(id);
        return;
    }

    const win = document.createElement('div');
    win.className = 'window';
    win.dataset.desktop = OS.currentDesktop;
    win.dataset.id = id; // Important for tracking

    win.style.left = Math.random() * 300 + 100 + 'px';
    win.style.top = Math.random() * 100 + 80 + 'px';

    win.innerHTML = `
        <div class="titlebar">
            <div class="window-buttons">
                <div class="window-btn close"></div>
                <div class="window-btn min"></div>
                <div class="window-btn max"></div>
            </div>
            <div>${title}</div>
            <div></div>
        </div>
        <div class="window-content"></div>
        <div class="resize-handle"></div>
    `;

    document.getElementById('desktop').appendChild(win);
    openWindowsRegistry[id] = win;

    // --- NEW: Create Taskbar Item ---
    createTaskbarItem(id, title);

    renderApp(id, win.querySelector('.window-content'));

    // Close Logic
    win.querySelector('.close').onclick = () => {
        win.remove();
        delete openWindowsRegistry[id];
        removeTaskbarItem(id); // Remove button
    };

    win.querySelector('.min').onclick = () => {
        win.style.display = 'none';
    };

    win.querySelector('.max').onclick = () => {
        toggleMax(win);
    };

    // Clicking window brings it to front
    win.addEventListener('mousedown', () => {
        win.style.zIndex = ++z;
        highlightTaskbar(id);
    });

    dragWindow(win);
    resizeWindow(win);
    notify(title + ' opened');
}

function toggleMax(win) {
    if (!win.classList.contains('maxed')) {
        win.dataset.left = win.style.left;
        win.dataset.top = win.style.top;
        win.dataset.width = win.style.width;
        win.dataset.height = win.style.height;

        win.style.left = '0';
        win.style.top = '0';
        win.style.width = '100%';
        win.style.height = 'calc(100vh - 48px)';

        win.classList.add('maxed');
    } else {
        win.style.left = win.dataset.left;
        win.style.top = win.dataset.top;
        win.style.width = win.dataset.width;
        win.style.height = win.dataset.height;

        win.classList.remove('maxed');
    }
}

function dragWindow(win) {
    const bar = win.querySelector('.titlebar');

    let dragging = false;
    let ox = 0;
    let oy = 0;

    bar.addEventListener('mousedown', e => {
        dragging = true;
        ox = e.clientX - win.offsetLeft;
        oy = e.clientY - win.offsetTop;

        win.style.zIndex = ++z;
    });

    window.addEventListener('mousemove', e => {
        if (!dragging) return;

        win.style.left = e.clientX - ox + 'px';
        win.style.top = e.clientY - oy + 'px';

        if (e.clientX <= 10) snapWindow(win, 'left');
        if (e.clientX >= innerWidth - 10) snapWindow(win, 'right');
    });

    window.addEventListener('mouseup', () => dragging = false);
}

function resizeWindow(win) {
    const handle = win.querySelector('.resize-handle');

    handle.addEventListener('mousedown', e => {
        e.preventDefault();

        const sw = win.offsetWidth;
        const sh = win.offsetHeight;
        const sx = e.clientX;
        const sy = e.clientY;

        function move(ev) {
            win.style.width = sw + (ev.clientX - sx) + 'px';
            win.style.height = sh + (ev.clientY - sy) + 'px';
        }

        function stop() {
            removeEventListener('mousemove', move);
            removeEventListener('mouseup', stop);
        }

        addEventListener('mousemove', move);
        addEventListener('mouseup', stop);
    });
}

function snapWindow(win, side) {
    if (side === 'left') {
        win.style.left = '0';
        win.style.top = '0';
        win.style.width = '50%';
        win.style.height = 'calc(100vh - 48px)';
    }

    if (side === 'right') {
        win.style.left = '50%';
        win.style.top = '0';
        win.style.width = '50%';
        win.style.height = 'calc(100vh - 48px)';
    }
}

function switchDesktop(index) {
    OS.currentDesktop = index;

    document.querySelectorAll('.window').forEach(win => {
        win.style.display = win.dataset.desktop == index ? 'block' : 'none';
    });
}

window.addEventListener('keydown', e => {
    if (e.altKey && e.key === 'Tab') {
        e.preventDefault();

        const ids = Object.keys(openWindowsRegistry);

        if (!ids.length) return;

        altIndex = (altIndex + 1) % ids.length;

        const current = openWindowsRegistry[ids[altIndex]];

        current.style.zIndex = ++z;

        const box = document.getElementById('alt-tab');
        box.style.display = 'block';
        box.innerText = ids[altIndex];
    }
});

window.addEventListener('keyup', e => {
    if (e.key === 'Alt') {
        document.getElementById('alt-tab').style.display = 'none';
    }
});

function renderApp(id, container) {
    if (id === 'browser') {
        container.innerHTML = `
            <div style="display:flex; flex-direction:column; height:100%;">
                <div style="display:flex; gap:10px; padding:10px;">
                    <input id="browser-url" class="app-input" placeholder="https://example.com" style="flex:1;">
                    <button class="app-btn" onclick="goBrowser(this)">Go</button>
                </div>
                <iframe id="browser-frame" sandbox="allow-scripts allow-same-origin allow-forms" style="flex:1; border:none; background:white;"></iframe>
            </div>`;
    } 
    else if (id === 'tulo') {
        // TULO THE TURTLE WRITER
        container.innerHTML = `
            <div style="display:flex; flex-direction:column; height:100%; padding:10px; gap:10px;">
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <h2>🐢 Tulo's Story Writer</h2>
                    <div>
                        <button class="app-btn" onclick="saveStory()">💾 Save Story</button>
                        <button class="app-btn" onclick="clearStory()">🗑️ Clear</button>
                    </div>
                </div>
                <textarea id="story-text" style="flex:1; width:100%; border:none; background:rgba(255,255,255,0.9); padding:15px; font-family:'Georgia', serif; font-size:16px; border-radius:8px; resize:none;" placeholder="Once upon a time in Animalandia..."></textarea>
                <div id="save-status" style="color:#27c93f; font-size:12px;"></div>
            </div>`;
    }
    else if (id === 'explorer') {
        // FILE EXPLORER
        container.innerHTML = `
            <div style="display:flex; flex-direction:column; height:100%; padding:15px;">
                <h2>📂 Animalandia Files</h2>
                <div id="file-list" style="display:flex; flex-wrap:wrap; gap:15px; margin-top:15px; overflow-y:auto;"></div>
            </div>`;
        
        // Load files
        setTimeout(() => loadFiles(), 100);
    }
    else if (id === 'music') {
        container.innerHTML = `<div style="padding:20px;"><h2>Music Player</h2><audio controls style="width:100%; margin-top:20px;"><source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3"></audio></div>`;
    }
    else if (id === 'paint') {
        container.innerHTML = `<canvas id="paint" width="900" height="500" style="background:white;"></canvas>`;
        setTimeout(initPaint, 100);
    }
    else if (id === 'settings') {
        container.innerHTML = `<div style="padding:20px; display:flex; flex-direction:column; gap:14px;"><h2>Settings</h2><button class="app-btn" onclick="cycleWallpaper()">Change Wallpaper</button><button class="app-btn" onclick="notify('Theme changed')">Theme</button></div>`;
    }
    else {
        container.innerHTML = `<div style="padding:20px;"><h1>${id}</h1><p>AnimalandiaOS app window.</p></div>`;
    }
}

function goBrowser(btn) {
    const parent = btn.closest('.window-content');
    const url = parent.querySelector('#browser-url').value;
    parent.querySelector('#browser-frame').src = url;
}

function initPaint() {
    const canvas = document.getElementById('paint');
    const ctx = canvas.getContext('2d');

    let draw = false;

    canvas.addEventListener('mousedown', () => draw = true);
    canvas.addEventListener('mouseup', () => draw = false);

    canvas.addEventListener('mousemove', e => {
        if (!draw) return;

        ctx.fillRect(e.offsetX,e.offsetY,4,4);
    });
}

function saveStory() {
    const text = document.getElementById('story-text').value;
    if (!text.trim()) {
        notify("Tulo says: Write something first!");
        return;
    }

    const fileName = prompt("Name your story (e.g., 'LionKingChapter1'):");
    if (!fileName) return;

    const newFile = {
        name: fileName,
        content: text,
        date: new Date().toLocaleDateString()
    };

    virtualFileSystem.push(newFile);
    localStorage.setItem('animal-files', JSON.stringify(virtualFileSystem));
    
    notify(`Saved: ${fileName}`);
    document.getElementById('save-status').innerText = "Story saved to virtual memory!";
}

function clearStory() {
    if(confirm("Clear the text area?")) {
        document.getElementById('story-text').value = "";
    }
}

function loadFiles() {
    const list = document.getElementById('file-list');
    if (!list) return;
    
    list.innerHTML = "";
    
    if (virtualFileSystem.length === 0) {
        list.innerHTML = "<p>No stories yet. Open Tulo to write!</p>";
        return;
    }

    virtualFileSystem.forEach((file, index) => {
        const card = document.createElement('div');
        card.style.cssText = "background:rgba(255,255,255,0.1); padding:15px; border-radius:8px; width:150px; text-align:center; cursor:pointer; border:1px solid rgba(255,255,255,0.1);";
        card.innerHTML = `
            <div style="font-size:30px;">📄</div>
            <div style="font-weight:bold; margin-top:5px;">${file.name}</div>
            <div style="font-size:10px; color:#ccc;">${file.date}</div>
        `;
        
        card.onclick = () => {
            // Open Tulo and load content
            openWindow('Tulo');
            setTimeout(() => {
                const tuloWin = openWindowsRegistry['tulo'];
                if(tuloWin) {
                    const textarea = tuloWin.querySelector('#story-text');
                    if(textarea) textarea.value = file.content;
                }
            }, 100);
        };
        
        list.appendChild(card);
    });
}

const menu = document.getElementById('desktop-menu');

window.addEventListener('contextmenu', e => {
    e.preventDefault();

    menu.style.display = 'block';
    menu.style.left = e.clientX + 'px';
    menu.style.top = e.clientY + 'px';
});

window.addEventListener('click', () => {
    menu.style.display = 'none';
});

const desktop = document.getElementById('desktop');
const selection = document.getElementById('selection-box');

let selecting = false;
let sx = 0;
let sy = 0;

desktop.addEventListener('mousedown', e => {
    if (e.target !== desktop) return;

    selecting = true;

    sx = e.clientX;
    sy = e.clientY;

    selection.style.display = 'block';
});

window.addEventListener('mousemove', e => {
    if (!selecting) return;

    selection.style.left = Math.min(sx,e.clientX) + 'px';
    selection.style.top = Math.min(sy,e.clientY) + 'px';
    selection.style.width = Math.abs(e.clientX - sx) + 'px';
    selection.style.height = Math.abs(e.clientY - sy) + 'px';
});

window.addEventListener('mouseup', () => {
    selecting = false;
    selection.style.display = 'none';
});

window.onload = () => {
    applyWallpaper(OS.wallpaper);

    setTimeout(() => {
        document.getElementById('boot-screen').style.display = 'none';
    }, 3400);

    notify('Welcome to AnimalandiaOS Ultimate');
};
</script>
